schema_version: 1

context:
  name: ssh2-python
  version: 1.2.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: ebaa2ab5c0d287ed02e1d55c7e18de03d06910a4c5194a88ef47c4cafc427cb4

build:
  number: 0
  # skip: win
  env:
    SYSTEM_LIBSSH2: 1
  script:
    - pip install . -vv

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - libssh2
    - setuptools
  run:
    - python

tests:
  - python:
      imports:
        - ssh2.session
      pip_check: true

about:
  license: LGPL-2.1-only
  license_file: LICENSE
  summary: Super fast SSH library. Based on libssh2.
  description: |
    Super fast SSH2 protocol library.

    ssh2-python provides Python bindings for libssh2.

    Its only dependency is the libssh2 library.
  homepage: http://github.com/ParallelSSH/ssh2-python
  repository: https://github.com/ParallelSSH/ssh2-python

extra:
  recipe-maintainers:
    - pkittenis
    - thewchan
